<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicole - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/9134db96-10d6-4a64-a89f-c70d9b055807/39552d46-077f-4292-abe6-e4521f25675c/PH-en-20240617-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }
        .container {
            width: 100%; max-width: 420px;
            text-align: center;
            position: relative; z-index: 2;
            background: rgba(0, 0, 0, 0.75);
            padding: 35px; border-radius: 4px;
        }
        .logo {
            font-size: 40px; font-weight: 900;
            color: #e50914; margin-bottom: 25px;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 24px; font-weight: 700;
            margin-bottom: 8px; color: #fff;
        }
        .subtitle {
            font-size: 15px; color: #b3b3b3;
            margin-bottom: 30px; line-height: 1.5;
        }
        input {
            width: 100%; padding: 15px; margin-bottom: 16px;
            border: none; border-radius: 4px;
            font-size: 16px; background: #333; color: #fff;
            outline: none;
        }
        input::placeholder { color: #8c8c8c; }
        .main-btn {
            width: 100%; padding: 14px; margin: 10px 0 20px;
            border: none; border-radius: 4px;
            background: #e50914; color: white;
            font-size: 16px; font-weight: 600;
            cursor: pointer;
        }
        .error {
            color: #e50914; font-size: 14px;
            margin-bottom: 12px; display: none;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">PORTFOLIO</div>
    <h1>Sign In - Nicole L. Duero</h1>
    <p class="subtitle">Access your personal portfolio</p>

    <div class="error" id="loginError">Incorrect username or password.</div>

    <input type="text" id="loginUsername" placeholder="Username" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button class="main-btn" onclick="handleLogin()">Sign In</button>
</div>

<script>
function handleLogin() {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value;
    const errorBox = document.getElementById('loginError');

    // ✅ Correct login details
    const correctUser = "nicole_duero";
    const correctPass = "duero123";

    if (user === correctUser && pass === correctPass) {
        errorBox.style.display = 'none';
        alert('Welcome Nicole!');
        // ✅ Redirect to profile.html (same folder = works!)
        window.location.href = "profile.html";
    } else {
        errorBox.style.display = 'block';
    }
}
</script>
</body>
</html>
