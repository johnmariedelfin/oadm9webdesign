<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicole - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            color: #e50914;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            background: #333;
            color: #fff;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #error {
            color: #ff5555;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Sign In</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkLogin()">Login</button>
        <div id="error">Wrong Username or Password!</div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById("user").value.trim();
            const pass = document.getElementById("pass").value;

            if (user === "nicole" && pass === "1234") {
                alert("✅ Login Successful!");
                window.location.href = "profile.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
